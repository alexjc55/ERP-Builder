        pageIds:
          type: array
          items:
            type: integer
        records:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RecordPermission"

    Role:
      type: object
      required: [id, nameJson, permissionsJson, createdAt, updatedAt]
      properties:
        id:
          type: integer
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        permissionsJson:
          $ref: "#/components/schemas/RolePermissions"
        userCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RoleInput:
      type: object

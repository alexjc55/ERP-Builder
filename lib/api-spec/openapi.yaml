        id:
          type: integer
        entityId:
          type: integer
        fromStatusId:
          type: integer
        toStatusId:
          type: integer
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        allowedRoleIds:
          type: array
          items:
            type: integer
        requiredFieldKeys:
          type: array
          items:
            type: string
        actionsJson:
          type: array
          items:
            $ref: "#/components/schemas/TransitionAction"
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string

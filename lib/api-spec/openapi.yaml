        isFinal:
          type: boolean
          default: false
        isArchiveTrigger:
          type: boolean
          default: false
        archiveAfterDays:
          type: integer
          minimum: 0
          default: 0
        sortOrder:
          type: integer
        isActive:
          type: boolean
          default: true

    StatusUpdate:
      type: object
      properties:
        statusKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        color:
          type: string
        isDefault:
          type: boolean
        isFinal:
          type: boolean
        isArchiveTrigger:
          type: boolean
        archiveAfterDays:
          type: integer
          minimum: 0
        sortOrder:
          type: integer
        isActive:
          type: boolean

    StatusesReorderInput:
      type: object
      required: [entityId, items]
      properties:
        entityId:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [id, sortOrder]
            properties:
              id:
                type: integer
              sortOrder:
                type: integer

    # TRANSITIONS (Workflow Engine)
    TransitionsReorderInput:
      type: object
      required: [entityId, items]
      properties:
        entityId:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [id, sortOrder]
            properties:
              id:
                type: integer
              sortOrder:
                type: integer

    TransitionAction:
      type: object
      required: [type, fieldKey]
      properties:
        type:

        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RelationUpdate"
      responses:
        "200":
          description: Relation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Relation"
    delete:
      operationId: deleteRelation
      tags: [relations]
      summary: Delete relation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /records/{recordId}/links:
    get:
      operationId: listRecordLinks
      tags: [relations]
      summary: List linked records for a source record
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of linked records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LinkedRecord"
    post:
      operationId: createRecordLink
      tags: [relations]
      summary: Link a target record to a source record
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkInput"
      responses:
        "201":
          description: Link created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RecordLink"

  /links/{id}:
    delete:
      operationId: deleteRecordLink
      tags: [relations]
      summary: Delete a record link
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # VIEWS
  /entities/{entityId}/views:
    get:
      operationId: listEntityViews
      tags: [views]
      summary: List views for an entity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of views
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/View"
    post:
      operationId: createEntityView
      tags: [views]
      summary: Create a view on an entity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewInput"
      responses:
        "201":
          description: View created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/View"

  /views/{id}:
    get:
      operationId: getView
      tags: [views]
      summary: Get view by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: View found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/View"
    put:
      operationId: updateView
      tags: [views]
      summary: Update view
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewUpdate"
      responses:
        "200":
          description: View updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/View"
    delete:
      operationId: deleteView
      tags: [views]
      summary: Delete view
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /entities/{entityId}/views/reorder:
    post:
      operationId: reorderViews
      tags: [views]
      summary: Reorder views within an entity
      parameters:
        - name: entityId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ViewsReorderInput"
      responses:
        "200":
          description: Reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # ENTITIES
  /entities:
    get:
      operationId: listEntities
      tags: [entities]
      summary: List all entities
      responses:
        "200":
          description: List of entities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entity"
    post:
      operationId: createEntity
      tags: [entities]
      summary: Create a new entity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityInput"
      responses:
        "201":
          description: Entity created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"

  /entities/{id}:
    get:
      operationId: getEntity
      tags: [entities]
      summary: Get entity by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entity found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
    put:
      operationId: updateEntity
      tags: [entities]
      summary: Update entity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EntityUpdate"
      responses:
        "200":
          description: Entity updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entity"
    delete:
      operationId: deleteEntity
      tags: [entities]
      summary: Delete entity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /translations:
    get:
      operationId: listTranslations
      tags: [translations]
      summary: List all system translations
      responses:
        "200":
          description: Translations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Translation"
    post:
      operationId: createTranslation
      tags: [translations]
      summary: Create a translation key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationInput"
      responses:
        "201":
          description: Translation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Translation"

  /translations/{key}:
    put:
      operationId: updateTranslation
      tags: [translations]
      summary: Update a translation by key
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TranslationUpdate"
      responses:
        "200":
          description: Translation updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Translation"

  # DASHBOARD
  /dashboard/stats:
    get:
      operationId: getDashboardStats
      tags: [dashboard]
      summary: Get system dashboard statistics
      responses:
        "200":
          description: System stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  # GOOGLE DRIVE
  /google-drive/status:
    get:
      operationId: getGoogleDriveStatus
      tags: [googleDrive]
      summary: Lightweight Drive readiness for file-field forms (any authenticated user)
      responses:
        "200":
          description: Drive readiness
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleDriveStatus"

  /google-drive/connection:
    get:
      operationId: getGoogleDriveConnection
      tags: [googleDrive]
      summary: Full Drive connection info (admin)
      responses:
        "200":
          description: Connection info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleDriveConnectionInfo"
    put:
      operationId: updateGoogleDriveConnection
      tags: [googleDrive]
      summary: Set the Drive key mode and (for own mode) client credentials (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleDriveConnectionUpdate"
      responses:
        "200":
          description: Updated connection info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleDriveConnectionInfo"

  /google-drive/oauth/start:
    post:
      operationId: startGoogleDriveOauth
      tags: [googleDrive]
      summary: Begin the Drive OAuth consent flow; returns the consent URL (admin)
      responses:
        "200":
          description: Consent URL
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleDriveAuthUrl"

  /google-drive/disconnect:
    post:
      operationId: disconnectGoogleDrive
      tags: [googleDrive]
      summary: Disconnect Drive, clearing stored tokens and folder (admin)
      responses:
        "200":
          description: Updated connection info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleDriveConnectionInfo"

  /google-drive/folders:
    get:
      operationId: listGoogleDriveFolders
      tags: [googleDrive]
      summary: List managed Drive upload folders (admin)
      responses:
        "200":
          description: Managed folders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DriveFolder"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createGoogleDriveFolder
      tags: [googleDrive]
      summary: Create a new managed Drive folder (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriveFolderBody"
      responses:
        "200":
          description: Created folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriveFolder"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Drive not connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /google-drive/folders/{id}:
    delete:
      operationId: deleteGoogleDriveFolder
      tags: [googleDrive]
      summary: Remove a managed Drive folder from the list (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Cannot remove the default folder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Folder not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deleted-files:
    get:
      operationId: listDeletedFiles
      tags: [fileTrash]
      summary: List local files in the recycle bin (superAdmin)
      responses:
        "200":
          description: Trashed files, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeletedFile"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deleted-files/purge-all:
    post:
      operationId: purgeDeletedFiles
      tags: [fileTrash]
      summary: Permanently delete every file in the recycle bin (superAdmin)
      responses:
        "200":
          description: Trash emptied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /deleted-files/{id}:
    delete:
      operationId: deleteDeletedFile
      tags: [fileTrash]
      summary: Permanently delete one trashed file from storage (superAdmin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trashed file not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    DeletedFile:
      type: object
      required: [id, fieldKey, fileName, filePath, reason, deletedAt]
      properties:
        id:
          type: integer
        entityId:
          type: ["integer", "null"]
        entityName:
          type: ["object", "null"]
          additionalProperties: true
          description: Multilingual name snapshot of the source entity.
        recordId:
          type: ["integer", "null"]
        fieldKey:
          type: string
        fieldName:
          type: ["object", "null"]
          additionalProperties: true
          description: Multilingual name snapshot of the source field.
        fileName:
          type: string
        filePath:
          type: string
        fileSize:
          type: ["integer", "null"]
        contentType:
          type: ["string", "null"]
        reason:
          type: string
          enum: [record_deleted, field_cleared, field_replaced]
        deletedBy:
          type: ["integer", "null"]
        deletedAt:
          type: string
          format: date-time

    GoogleDriveStatus:
      type: object
      required: [connected, folderConfigured, enabled]
      properties:
        connected:
          type: boolean
          description: A refresh token is stored.
        folderConfigured:
          type: boolean
          description: An upload target folder is configured.
        enabled:
          type: boolean
          description: The Google Drive module is toggled on in the modules registry.

    GoogleDriveConnectionInfo:
      type: object
      required: [keyMode, connected, folderConfigured, builtinAvailable, hasOwnCreds, redirectUri]
      properties:
        keyMode:
          type: string
          enum: [builtin, own]
        connected:
          type: boolean
        folderConfigured:
          type: boolean
        builtinAvailable:
          type: boolean
          description: Whether the platform ships built-in OAuth client credentials.
        hasOwnCreds:
          type: boolean
          description: Whether own-mode client secret is stored.
        ownClientId:
          type: string
          description: The stored own-mode OAuth client ID (not secret).
        redirectUri:
          type: string
          description: The OAuth redirect URI to register in the Google client.
        accountEmail:
          type: string
        folderId:
          type: string
        folderName:
          type: string

    GoogleDriveConnectionUpdate:
      type: object
      required: [keyMode]
      properties:
        keyMode:
          type: string
          enum: [builtin, own]
        ownClientId:
          type: string
        ownClientSecret:
          type: string
          description: Plaintext client secret; stored encrypted. Omit to keep existing.

    GoogleDriveAuthUrl:
      type: object
      required: [authUrl]
      properties:
        authUrl:
          type: string

    DriveFolder:
      type: object
      required: [id, driveFolderId, name, isDefault]
      properties:
        id:
          type: integer
          description: Internal row id.
        driveFolderId:
          type: string
          description: Google Drive folder id (stored on a field's fileConfigJson.driveFolderId).
        name:
          type: string
        isDefault:
          type: boolean
          description: The auto-created default upload folder; cannot be removed.
        parentId:
          type: integer
          nullable: true
          description: Internal id of the parent folder for nested subfolders; null for top-level folders.

    CreateDriveFolderBody:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        parentId:
          type: integer
          nullable: true
          description: Optional parent folder (internal id) to create this folder as a subfolder.

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`).
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    # Multilingual label stored as JSONB {ru: ..., en: ..., he: ...}
    MultilingualText:
      type: object
      properties:
        ru:
          type: string
        en:
          type: string
        he:
          type: string

    # Platform branding / general settings (singleton row).
    AppSettings:
      type: object
      required: [appNameJson, subtitleJson, logoObjectPath, currencySymbol, defaultLanguage, updatedAt]
      properties:
        appNameJson:
          $ref: "#/components/schemas/MultilingualText"
        subtitleJson:
          $ref: "#/components/schemas/MultilingualText"
        logoObjectPath:
          type: ["string", "null"]
        currencySymbol:
          type: string
          description: Free-text currency symbol/suffix used wherever monetary values are rendered.
        defaultLanguage:
          type: string
          enum: [ru, en, he]
          description: Platform-wide default UI language for users who have not picked their own.
        updatedAt:
          type: string
          format: date-time

    AppSettingsUpdate:
      type: object
      properties:
        appNameJson:
          $ref: "#/components/schemas/MultilingualText"
        subtitleJson:
          $ref: "#/components/schemas/MultilingualText"
        logoObjectPath:
          type: ["string", "null"]
        currencySymbol:
          type: string
          maxLength: 8
        defaultLanguage:
          type: string
          enum: [ru, en, he]

    # AUTH
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserOption:
      type: object
      required: [id, name, roleId, roleIds]
      properties:
        id:
          type: integer
        name:
          type: string
        roleId:
          type: integer
        roleIds:
          type: array
          items:
            type: integer

    UserProfile:
      type: object
      required: [id, email, firstName, lastName, roleId, roleIds, language, direction, isActive]
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
          description: Primary role (used by JWT, display, impersonation, guest flows).
        roleIds:
          type: array
          items:
            type: integer
          description: All roles assigned to the user (includes the primary). Effective permissions are the most-permissive union across these roles.
        roleName:
          $ref: "#/components/schemas/MultilingualText"
        language:
          type: string
          enum: [ru, en, he]
        direction:
          type: string
          enum: [ltr, rtl]
        startPageId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        permissions:
          $ref: "#/components/schemas/RolePermissions"
        isGuest:
          type: boolean
        impersonator:
          type: ["object", "null"]
          properties:
            id:
              type: integer
            name:
              type: string

    ImpersonateInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    UpdateMeInput:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        language:
          type: string
          enum: [ru, en, he]
        direction:
          type: string
          enum: [ltr, rtl]
        startPageId:
          type: ["integer", "null"]

    ResetPasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 6

    GuestRedeemInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    GuestLink:
      type: object
      required: [id, userId, createdAt, isActive]
      properties:
        id:
          type: integer
        userId:
          type: integer
        label:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
        revokedAt:
          type: ["string", "null"]
          format: date-time
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        isActive:
          type: boolean
          description: True when the link is neither revoked nor expired.

    GuestLinkInput:
      type: object
      properties:
        label:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
          description: Optional expiry. Null or omitted means the link never expires.

    GuestLinkCreated:
      type: object
      required: [link, url, token]
      properties:
        link:
          $ref: "#/components/schemas/GuestLink"
        token:
          type: string
          description: The one-time plaintext token. Shown only at creation; not retrievable later.
        url:
          type: string
          description: Ready-to-share guest URL containing the token.

    # USERS
    User:
      type: object
      required: [id, email, firstName, lastName, roleId, roleIds, language, direction, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
          description: Primary role (used by JWT, display, impersonation, guest flows).
        roleIds:
          type: array
          items:
            type: integer
          description: All roles assigned to the user (includes the primary).
        roleName:
          $ref: "#/components/schemas/MultilingualText"
        language:
          type: string
          enum: [ru, en, he]
        direction:
          type: string
          enum: [ltr, rtl]
        startPageId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserListResult:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer

    UserInput:
      type: object
      required: [email, firstName, lastName, roleIds]
      properties:
        email:
          type: string
          format: email
        password:
          type: ["string", "null"]
          minLength: 6
          description: Omit or null to create a passwordless guest user (cannot log in with a password; access only via a guest link).
        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
          description: Deprecated and ignored on create — the primary role is roleIds[0]. Retained only because user responses still expose roleId.
        roleIds:
          type: array
          minItems: 1
          items:
            type: integer
          description: All roles to assign (non-empty). The first element is the primary role (used by JWT, display, impersonation, guest flows).
        language:
          type: string
          enum: [ru, en, he]
          default: ru
        direction:
          type: string
          enum: [ltr, rtl]
          default: ltr
        startPageId:
          type: ["integer", "null"]

    FieldUserInput:
      type: object
      required: [email, firstName, lastName, roleId]
      description: >-
        Payload for creating a user inline from a user-type field. Unlike
        UserInput this assigns exactly ONE role, and the server hard-rejects any
        role outside the field's allowedRoleIds or any privileged (admin) role.
      properties:
        email:
          type: string
          format: email
        password:
          type: ["string", "null"]
          minLength: 6
          description: Omit or null to create a passwordless guest user (cannot log in with a password; access only via a guest link).
        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
          description: The single role to assign. Must be allowed by the field and must not be a privileged (admin) role.
        language:
          type: string
          enum: [ru, en, he]
          default: ru
        direction:
          type: string
          enum: [ltr, rtl]
          default: ltr
        pageId:
          type: integer
          description: Optional mirror-page context used to resolve the caller's record-edit permission.

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
          description: Deprecated. Optional back-compat alias used only as the primary when roleIds is omitted; prefer roleIds.
        roleIds:
          type: array
          minItems: 1
          items:
            type: integer
          description: Replaces the full set of assigned roles (non-empty). The first element is the primary role.
        language:
          type: string
          enum: [ru, en, he]
        direction:
          type: string
          enum: [ltr, rtl]
        startPageId:
          type: ["integer", "null"]

    LoginHistoryEntry:
      type: object
      required: [id, userId, ipAddress, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        ipAddress:
          type: string
        userAgent:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AuditLogEntry:
      type: object
      required: [id, fieldKey, oldValue, newValue, userId, userName, createdAt]
      properties:
        id:
          type: integer
        entityId:
          type: ["integer", "null"]
        recordId:
          type: ["integer", "null"]
        fieldKey:
          type: ["string", "null"]
        oldValue:
          type: ["string", "null"]
        newValue:
          type: ["string", "null"]
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # EVENTS
    SystemEvent:
      type: object
      required: [id, eventName, entityId, recordId, payloadJson, actorName, createdAt]
      properties:
        id:
          type: integer
        eventName:
          type: string
        entityId:
          type: ["integer", "null"]
        recordId:
          type: ["integer", "null"]
        payloadJson:
          type: object
          additionalProperties: true
        actorName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    SystemEventList:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/SystemEvent"
        total:
          type: integer

    # MODULES (Modules Architecture — plugin registry infrastructure)
    Module:
      type: object
      required: [id, moduleKey, nameJson, version, isEnabled, settingsJson, createdAt, updatedAt]
      properties:
        id:
          type: integer
        moduleKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        version:
          type: string
        isEnabled:
          type: boolean
        settingsJson:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ModuleInput:
      type: object
      required: [moduleKey, nameJson]
      properties:
        moduleKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        version:
          type: string
        isEnabled:
          type: boolean
        settingsJson:
          type: object
          additionalProperties: true

    ModuleUpdate:
      type: object
      properties:
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        version:
          type: string
        isEnabled:
          type: boolean
        settingsJson:
          type: object
          additionalProperties: true

    # ROLES
    RecordScope:
      type: string
      enum: [all, own]

    RecordPermission:
      type: object
      required: [view, create, update, delete]
      properties:
        view:
          type: boolean
        create:
          type: boolean
        update:
          type: boolean
        delete:
          type: boolean
        scope:
          $ref: "#/components/schemas/RecordScope"
        scopeFieldKeys:
          type: array
          items:
            type: string
        hiddenStatusIds:
          type: array
          items:
            type: integer
        hiddenRowStatusIds:
          type: array
          items:
            type: integer
        hideStatusColumn:
          type: boolean
          description: >-
            Cosmetic per-role hide of the whole "Status" column in the records
            table (mirrors hiddenStatusIds semantics: superAdmin bypasses).
        hideActionsColumn:
          type: boolean
          description: >-
            Cosmetic per-role hide of the whole "Actions" column (edit/history/
            archive/delete) in the records table. superAdmin bypasses.

    RoleAdminCaps:
      type: object
      required: [pages, entities, roles, users, translations, events, modules, googleDrive, settings]
      properties:
        pages:
          type: boolean
        entities:
          type: boolean
        roles:
          type: boolean
        users:
          type: boolean
        translations:
          type: boolean
        events:
          type: boolean
        modules:
          type: boolean
        googleDrive:
          type: boolean
        settings:
          type: boolean

    RolePermissions:
      type: object
      required: [superAdmin, admin, pageIds, records]
      properties:
        superAdmin:
          type: boolean
        admin:
          $ref: "#/components/schemas/RoleAdminCaps"
        pageIds:
          type: array
          items:
            type: integer
        records:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/RecordPermission"

    Role:
      type: object
      required: [id, nameJson, permissionsJson, createdAt, updatedAt]
      properties:
        id:
          type: integer
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        permissionsJson:
          $ref: "#/components/schemas/RolePermissions"
        userCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RoleInput:
      type: object
      required: [nameJson]
      properties:
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        permissionsJson:
          $ref: "#/components/schemas/RolePermissions"

    RoleUpdate:
      type: object
      properties:
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        permissionsJson:
          $ref: "#/components/schemas/RolePermissions"

    # PAGES
    Page:
      type: object
      required: [id, nameJson, icon, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:
          type: string
        path:
          type: ["string", "null"]
        parentPageId:
          type: ["integer", "null"]
        mirrorEntityId:
          type: ["integer", "null"]
        mirrorFieldKeysJson:
          type: ["array", "null"]
          items:
            type: string
        mirrorFieldLabelsJson:
          type: ["object", "null"]
          additionalProperties:
            $ref: "#/components/schemas/MultilingualText"
          description: Per-mirror-page display label override for mirrored source-entity fields, keyed by fieldKey. Display-only, not a security boundary.
        isDashboard:
          type: boolean
        widgetsCollapsedDefault:
          type: boolean
          description: Default collapsed state of the analytics widgets block above a page's records table
        sortOrder:
          type: integer
        isActive:
          type: boolean
        children:
          type: array
          items:
            $ref: "#/components/schemas/Page"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PageInput:
      type: object
      required: [nameJson, icon]
      properties:
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:
          type: string
        path:
          type: ["string", "null"]
        parentPageId:
          type: ["integer", "null"]
        mirrorEntityId:
          type: ["integer", "null"]
        mirrorFieldKeysJson:
          type: ["array", "null"]
          items:
            type: string
        mirrorFieldLabelsJson:
          type: ["object", "null"]
          additionalProperties:
            $ref: "#/components/schemas/MultilingualText"
          description: Per-mirror-page display label override for mirrored source-entity fields, keyed by fieldKey. Display-only, not a security boundary.
        isDashboard:
          type: boolean
        widgetsCollapsedDefault:
          type: boolean
          default: false
          description: Default collapsed state of the analytics widgets block above a page's records table
        sortOrder:
          type: integer
        isActive:
          type: boolean
          default: true

    PageUpdate:
      type: object
      properties:
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:
          type: string
        path:
          type: ["string", "null"]
        parentPageId:
          type: ["integer", "null"]
        mirrorEntityId:
          type: ["integer", "null"]
        mirrorFieldKeysJson:
          type: ["array", "null"]
          items:
            type: string
        mirrorFieldLabelsJson:
          type: ["object", "null"]
          additionalProperties:
            $ref: "#/components/schemas/MultilingualText"
          description: Per-mirror-page display label override for mirrored source-entity fields, keyed by fieldKey. Display-only, not a security boundary.
        isDashboard:
          type: boolean
        widgetsCollapsedDefault:
          type: boolean
          description: Default collapsed state of the analytics widgets block above a page's records table
        sortOrder:
          type: integer
        isActive:
          type: boolean

    ReorderInput:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [id, sortOrder]
            properties:
              id:
                type: integer
              sortOrder:
                type: integer

    # DASHBOARD
    WidgetMetric:
      type: object
      required: [key, entityId, aggregation]
      properties:
        key:
          type: string
          description: Identifier referenced from the widget formula as {key}
        entityId:
          type: integer
        aggregation:
          type: string
          enum: [count, sum]
        fieldKey:
          type: ["string", "null"]
          description: Numeric field to sum (required when aggregation = sum). For related metrics this is the related entity's field key.
        relationId:
          type: ["integer", "null"]
          description: When set, the metric is computed over a related entity through this qualifying single-link relation (count of links, or sum of the related field).
        statusIds:
          type: ["array", "null"]
          items:
            type: integer
          description: Restrict to records in these statuses; empty/null = all statuses
        source:
          type: string
          enum: [entity, page]
          description: Value source — "entity" (entity records, the default) or "page" (page-local field values from page_record_values for pageId). When "page", fieldKey refers to a page-local field of pageId and relationId is ignored.
        pageId:
          type: ["integer", "null"]
          description: When source = page, the page whose page-local field is aggregated.

    ChartConfig:
      type: object
      required: [type, entityId, groupBy, aggregation]
      properties:
        type:
          type: string
          enum: [bar, line, area, pie, donut]
        entityId:
          type: integer
        groupBy:
          type: object
          required: [kind]
          properties:
            kind:
              type: string
              enum: [status, field]
            fieldKey:
              type: ["string", "null"]
              description: Field whose values form the chart buckets (when kind = field)
        aggregation:
          type: string
          enum: [count, sum]
        fieldKey:
          type: ["string", "null"]
          description: Numeric field to sum per bucket (required when aggregation = sum)
        statusIds:
          type: ["array", "null"]
          items:
            type: integer
          description: Restrict to records in these statuses; empty/null = all statuses
        source:
          type: string
          enum: [entity, page]
          description: Value source — "entity" (entity records, the default) or "page" (page-local field values from page_record_values for pageId). When "page", groupBy.fieldKey / fieldKey refer to page-local fields of pageId.
        pageId:
          type: ["integer", "null"]
          description: When source = page, the page whose page-local field is aggregated.
        showValues:
          type: ["boolean", "null"]
          description: When true, render numeric value labels directly on the chart; when false/null, values show only on hover

    TableConfig:
      type: object
      required: [entityId, fieldKeys]
      properties:
        entityId:
          type: integer
        fieldKeys:
          type: array
          items:
            type: string
          description: Field keys shown as table columns, in display order
        relatedColumns:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/TableRelatedColumn"
          description: Related-entity columns, each surfacing one field of a linked record through a qualifying single-link relation. Appended after the entity columns.
        statusIds:
          type: ["array", "null"]
          items:
            type: integer
          description: Restrict to records in these statuses; empty/null = all statuses
        limit:
          type: ["integer", "null"]
          description: Max rows to show (clamped server-side); null = server default

    TableRelatedColumn:
      type: object
      required: [relationId, relatedFieldKey]
      properties:
        relationId:
          type: integer
        relatedFieldKey:
          type: string

    NoteCellSource:
      type: object
      required: [key, sourceKind, entityId]
      description: A live value referenced from a notes-table cell formula as {key}. Either an entity aggregate (sourceKind = metric) or a specific record's field value (sourceKind = record).
      properties:
        key:
          type: string
          description: Identifier referenced from the cell formula as {key}
        sourceKind:
          type: string
          enum: [metric, record]
        entityId:
          type: integer
        aggregation:
          type: ["string", "null"]
          enum: [count, sum, null]
          description: For sourceKind = metric — count of records or sum of a numeric field.
        fieldKey:
          type: ["string", "null"]
          description: For metric sum — the numeric field (related entity's field when relationId is set). For record source — the field whose stored value is shown.
        relationId:
          type: ["integer", "null"]
          description: For sourceKind = metric — compute over a related entity through this qualifying single-link relation.
        statusIds:
          type: ["array", "null"]
          items:
            type: integer
          description: For sourceKind = metric — restrict to records in these statuses; empty/null = all statuses.
        recordId:
          type: ["integer", "null"]
          description: For sourceKind = record — the specific record whose field value is shown.

    NoteCell:
      type: object
      required: [kind]
      description: A single cell of a notes free-form table. Either static text or a dynamic live value.
      properties:
        kind:
          type: string
          enum: [static, dynamic]
        text:
          type: ["string", "null"]
          description: Static cell text (kind = static).
        sources:
          type: ["array", "null"]
          items:
            $ref: "#/components/schemas/NoteCellSource"
          description: Live-value sources (kind = dynamic).
        formula:
          type: ["string", "null"]
          description: Optional expression combining the cell's source keys as {key}; without it the first source value is shown.
        format:
          type: ["string", "null"]
          enum: [number, currency, percent, null]
          description: Number formatting for the computed dynamic value.

    NotesConfig:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [richtext, table]
        html:
          type: ["string", "null"]
          description: Sanitized rich-text HTML (kind = richtext).
        cols:
          type: ["integer", "null"]
          description: Number of columns in the free-form table (kind = table).
        cells:
          type: ["array", "null"]
          description: Row-major grid of cells (kind = table); each inner array is one row.
          items:
            type: array
            items:
              $ref: "#/components/schemas/NoteCell"
        editableRoleIds:
          type: ["array", "null"]
          items:
            type: integer
          description: Roles (besides page-admins) whose members may inline-edit this notes widget's content. null/empty = admins only.

    WidgetConfig:
      type: object
      properties:
        widgetType:
          type: ["string", "null"]
          enum: [metric, chart, table, notes, null]
          description: metric (default) = number cards; chart = graph; table = entity rows; notes = rich-text block or free-form live-value table.
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/WidgetMetric"
        notes:
          $ref: "#/components/schemas/NotesConfig"
        formula:
          type: ["string", "null"]
          description: Optional expression combining metric keys as {key}
        format:
          type: ["string", "null"]
          enum: [number, currency, percent, null]
        chart:
          $ref: "#/components/schemas/ChartConfig"
        table:
          $ref: "#/components/schemas/TableConfig"
        colorStyle:
          type: ["string", "null"]
          enum: [icon, border, fill, null]
          description: How the widget color is applied — icon box (default), card border, or full fill.
        textColor:
          type: ["string", "null"]
          enum: [light, dark, null]
          description: Font color when colorStyle is "fill" (light = white text, dark = dark text).

    DashboardWidget:
      type: object
      required: [id, pageId, titleJson, config, icon, color, gridW, gridH, sortOrder, createdAt, updatedAt]
      properties:
        id:
          type: integer
        pageId:
          type: integer
        titleJson:
          $ref: "#/components/schemas/MultilingualText"
        config:
          $ref: "#/components/schemas/WidgetConfig"
        visibleRoleIds:
          type: ["array", "null"]
          items:
            type: integer
        icon:
          type: string
        color:
          type: string
        gridW:
          type: integer
        gridH:
          type: integer
        sortOrder:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DashboardWidgetInput:
      type: object
      required: [titleJson, config]
      properties:
        titleJson:
          $ref: "#/components/schemas/MultilingualText"
        config:
          $ref: "#/components/schemas/WidgetConfig"
        visibleRoleIds:
          type: ["array", "null"]
          items:
            type: integer
        icon:
          type: string
        color:
          type: string
        gridW:
          type: integer
        gridH:
          type: integer
        sortOrder:
          type: integer

    ChartSeriesPoint:
      type: object
      required: [label, value]
      properties:
        label:
          type: string
        value:
          type: number
        color:
          type: ["string", "null"]

    TableColumn:
      type: object
      required: [fieldKey, label, fieldType]
      properties:
        fieldKey:
          type: string
        label:
          type: string
        fieldType:
          type: string

    TableRow:
      type: object
      required: [id, values]
      properties:
        id:
          type: integer
        values:
          type: object
          additionalProperties: true
          description: fieldKey to stored value map (only the widget's columns)

    NoteCellData:
      type: object
      required: [kind]
      description: Computed view of a notes-table cell shipped to the viewer.
      properties:
        kind:
          type: string
          enum: [static, dynamic]
        text:
          type: ["string", "null"]
          description: Static cell text (kind = static).
        values:
          type: ["object", "null"]
          additionalProperties: true
          description: Computed value per source key (kind = dynamic); each value is a number or string (admin-authoritative).
        formula:
          type: ["string", "null"]
        format:
          type: ["string", "null"]
          enum: [number, currency, percent, null]

    NotesData:
      type: object
      required: [kind]
      description: Computed view of a notes widget shipped to the viewer.
      properties:
        kind:
          type: string
          enum: [richtext, table]
        html:
          type: ["string", "null"]
          description: Sanitized rich-text HTML (kind = richtext).
        cols:
          type: ["integer", "null"]
        cells:
          type: ["array", "null"]
          items:
            type: array
            items:
              $ref: "#/components/schemas/NoteCellData"

    DashboardWidgetData:
      type: object
      required: [id, titleJson, icon, color, gridW, gridH, sortOrder, metrics]
      properties:
        id:
          type: integer
        titleJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:
          type: string
        color:
          type: string
        gridW:
          type: integer
        gridH:
          type: integer
        sortOrder:
          type: integer
        widgetType:
          type: ["string", "null"]
          enum: [metric, chart, table, notes, null]
        chartType:
          type: ["string", "null"]
        showValues:
          type: ["boolean", "null"]
          description: When true, the chart widget renders numeric value labels directly on the chart
        series:
          type: array
          items:
            $ref: "#/components/schemas/ChartSeriesPoint"
          description: Grouped buckets for chart widgets (admin-authoritative real totals)
        tableColumns:
          type: array
          items:
            $ref: "#/components/schemas/TableColumn"
          description: Column metadata for table widgets, in display order
        tableRows:
          type: array
          items:
            $ref: "#/components/schemas/TableRow"
          description: Rows for table widgets (admin-authoritative, status-filtered, limited)
        tableEntityId:
          type: ["integer", "null"]
          description: For table widgets, the source entity id (lets the client link rows to the entity's page)
        formula:
          type: ["string", "null"]
        format:
          type: ["string", "null"]
        colorStyle:
          type: ["string", "null"]
          enum: [icon, border, fill, null]
        textColor:
          type: ["string", "null"]
          enum: [light, dark, null]
        metrics:
          type: object
          additionalProperties:
            type: number
          description: Computed value per metric key (admin-authoritative real totals)
        notes:
          $ref: "#/components/schemas/NotesData"
        canEditNotes:
          type: ["boolean", "null"]
          description: For notes widgets, whether the requesting viewer may inline-edit this widget's content (page-admin or a role in editableRoleIds).

    NotesContentInput:
      type: object
      required: [kind]
      description: Inline content edit for a notes widget. richtext replaces the rich-text HTML; table updates the text of existing static cells only (computed cells and grid structure are immutable here).
      properties:
        kind:
          type: string
          enum: [richtext, table]
        html:
          type: ["string", "null"]
          description: New rich-text HTML (kind = richtext); re-sanitized server-side.
        cells:
          type: ["array", "null"]
          description: Static-cell text edits (kind = table).
          items:
            type: object
            required: [row, col, text]
            properties:
              row:
                type: integer
              col:
                type: integer
              text:
                type: string

    # ENTITIES
    Entity:
      type: object
      required: [id, entityKey, nameJson, icon, defaultSortJson, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        entityKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:
          type: string
        pageId:
          type: ["integer", "null"]
        defaultSortJson:
          type: array
          items:
            $ref: "#/components/schemas/SortSpec"
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    EntityInput:
      type: object
      required: [entityKey, nameJson, icon]
      properties:
        entityKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:
          type: string
        pageId:
          type: ["integer", "null"]
        defaultSortJson:
          type: array
          items:
            $ref: "#/components/schemas/SortSpec"
        sortOrder:
          type: integer
        isActive:
          type: boolean
          default: true

    EntityUpdate:
      type: object
      properties:
        entityKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:
          type: string
        pageId:
          type: ["integer", "null"]
        defaultSortJson:
          type: array
          items:
            $ref: "#/components/schemas/SortSpec"
        sortOrder:
          type: integer
        isActive:
          type: boolean

    # FIELDS
    FieldType:
      type: string
      enum:
        - text
        - textarea
        - number
        - boolean
        - date
        - datetime
        - select
        - email
        - url
        - phone
        - user
        - file
        - function
        - relation
        - lookup

    FormatOperator:
      type: string
      enum:
        - equals
        - notEquals
        - contains
        - notContains
        - empty
        - notEmpty
        - gt
        - lt
        - gte
        - lte

    FieldFormatRule:
      type: object
      required: [operator]
      description: >-
        One conditional-formatting rule. When a cell value matches
        operator/value, the cell is painted cellColor and/or the row rowColor,
        and the cell text is painted textColor.
        Rules are evaluated in order; first match wins per field.
      properties:
        operator:
          $ref: "#/components/schemas/FormatOperator"
        value:
          type: string
        cellColor:
          type: string
        rowColor:
          type: string
        textColor:
          type: string

    FormulaFieldConfig:
      type: object
      description: >-
        Per-field configuration for a `function`-type field. `expression` is a
        safe formula referencing other fields of the same record via
        {field_key}; it is computed at read time and never stored. `decimals`,
        when set, rounds a numeric result to that many decimal places on display.
      properties:
        expression:
          type: string
        decimals:
          type: integer
          minimum: 0
          maximum: 10
          nullable: true
          description: >-
            Optional. When set and the formula result is numeric, the value is
            rounded and shown with this many decimal places. Null/omitted means
            no rounding. Ignored for non-numeric (text/boolean) results.

    DependencyFieldConfig:
      type: object
      description: >-
        Per-field configuration for a dependent ("cascading") field. When
        `dependsOnFieldKey` is set, this field is gated on the parent field:
        its picker is disabled until the parent has a value. For a `text`
        field, its option list is the distinct existing values of this field
        among records whose parent-chain matches the current row. For a
        `relation` field, `relatedFilterFieldKey` names a field on the RELATED
        entity; the candidate list is narrowed to related records whose that
        field matches the parent field's value in the row being edited.
      properties:
        dependsOnFieldKey:
          type: string
        relatedFilterFieldKey:
          type: string
          description: >-
            Relation fields only. The field key on the related entity whose
            value must match the parent field's value for a record to be
            offered as a link candidate.

    FieldAccess:
      type: string
      enum: [hidden, view, edit]

    FieldPermissions:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/FieldAccess"

    FileSource:
      type: string
      description: A source a file-type field value may come from.
      enum: [server, gdrive, link]

    FileFieldConfig:
      type: object
      description: >-
        Per-field configuration for a `file`-type field. `allowedSources` lists
        which fill-time sources are offered/accepted. Empty or unset means the
        legacy default (server upload only).
      properties:
        allowedSources:
          type: array
          items:
            $ref: "#/components/schemas/FileSource"
        driveFolderId:
          type: string
          description: >-
            Google Drive folder id this field's uploads land in (one of the
            admin-managed folders). Unset means the default upload folder.

    UserFieldConfig:
      type: object
      description: >-
        Per-field configuration for a `user`-type field. `allowedRoleIds`
        restricts selectable users to those roles. Empty or unset means any
        user may be selected. `allowCreate` lets a user be created inline from
        the value picker, with the new account's role limited to
        `allowedRoleIds`.
      properties:
        allowedRoleIds:
          type: array
          items:
            type: integer
        allowCreate:
          type: boolean

    Field:
      type: object
      required: [id, entityId, fieldKey, nameJson, fieldType, isRequired, optionsJson, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        entityId:
          type: integer
        fieldKey:
          type: string
        nameJson:

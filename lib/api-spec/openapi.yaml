        - select
        - email
        - url
        - phone
        - user
        - file

    FieldAccess:
      type: string
      enum: [hidden, view, edit]

    FieldPermissions:
      type: object
      additionalProperties:
        $ref: "#/components/schemas/FieldAccess"

    FileSource:
      type: string
      description: A source a file-type field value may come from.
      enum: [server, gdrive, link]

    FileFieldConfig:
      type: object
      description: >-
        Per-field configuration for a `file`-type field. `allowedSources` lists
        which fill-time sources are offered/accepted. Empty or unset means the
        legacy default (server upload only).
      properties:
        allowedSources:
          type: array
          items:
            $ref: "#/components/schemas/FileSource"

    Field:
      type: object
      required: [id, entityId, fieldKey, nameJson, fieldType, isRequired, optionsJson, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        entityId:
          type: integer
        fieldKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        fieldType:
          $ref: "#/components/schemas/FieldType"
        isRequired:
          type: boolean
        defaultValue:
          type: ["string", "null"]
        optionsJson:
          type: array
          items:
            type: string
        permissionsJson:
          $ref: "#/components/schemas/FieldPermissions"
        fileConfigJson:
          $ref: "#/components/schemas/FileFieldConfig"

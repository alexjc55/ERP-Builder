        userConfigJson:
          $ref: "#/components/schemas/UserFieldConfig"
        formatRulesJson:
          type: array
          items:
            $ref: "#/components/schemas/FieldFormatRule"
        formulaConfigJson:
          $ref: "#/components/schemas/FormulaFieldConfig"
        dependencyConfigJson:
          $ref: "#/components/schemas/DependencyFieldConfig"
        relationConfigJson:
          $ref: "#/components/schemas/RelationFieldConfig"
        isKey:
          type: boolean
        lockAfterCreate:
          type: boolean
        isFilterable:
          type: boolean
        showInTable:
          type: boolean
        isPinned:
          type: boolean
        showColumnTotal:
          type: boolean
        totalFillColor:
          type: ["string", "null"]
        totalTextColor:
          type: ["string", "null"]
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time


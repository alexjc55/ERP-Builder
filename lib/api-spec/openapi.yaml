        showInTable:
          type: boolean
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    FieldInput:
      type: object
      required: [fieldKey, nameJson, fieldType]
      properties:
        fieldKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        fieldType:
          $ref: "#/components/schemas/FieldType"
        isRequired:
          type: boolean
          default: false
        defaultValue:
          type: ["string", "null"]
        optionsJson:
          type: array
          items:
            type: string
        permissionsJson:
          $ref: "#/components/schemas/FieldPermissions"
        fileConfigJson:
          $ref: "#/components/schemas/FileFieldConfig"
        isFilterable:
          type: boolean
          default: false
        showInTable:
          type: boolean
          default: true
        sortOrder:
          type: integer
        isActive:
          type: boolean
          default: true

    FieldsReorderInput:
      type: object
      required: [entityId, items]
      properties:
        entityId:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [id, sortOrder]
            properties:
              id:
                type: integer
              sortOrder:
                type: integer

    FieldUpdate:
      type: object
      properties:
        fieldKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        fieldType:
          $ref: "#/components/schemas/FieldType"
        isRequired:
          type: boolean
        defaultValue:
          type: ["string", "null"]
        optionsJson:
          type: array
          items:
            type: string
        permissionsJson:
          $ref: "#/components/schemas/FieldPermissions"
        fileConfigJson:
          $ref: "#/components/schemas/FileFieldConfig"
        isFilterable:
          type: boolean
        showInTable:
          type: boolean
        sortOrder:
          type: integer
        isActive:
          type: boolean

    Status:
      type: object
      required: [id, entityId, statusKey, nameJson, color, isDefault, isFinal, isArchiveTrigger, archiveAfterDays, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        entityId:
          type: integer
        statusKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        color:
          type: string
        isDefault:
          type: boolean
        isFinal:
          type: boolean
        isArchiveTrigger:
          type: boolean
        archiveAfterDays:
          type: integer
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    StatusInput:
      type: object
      required: [statusKey, nameJson]
      properties:
        statusKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        color:
          type: string
        isDefault:
          type: boolean

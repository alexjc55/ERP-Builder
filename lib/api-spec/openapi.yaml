        isEnabled:
          type: boolean
        settingsJson:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ModuleInput:
      type: object
      required: [moduleKey, nameJson]
      properties:
        moduleKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        version:
          type: string
        isEnabled:
          type: boolean
        settingsJson:
          type: object
          additionalProperties: true

    ModuleUpdate:
      type: object
      properties:

            application/json:
              schema:
                $ref: "#/components/schemas/GoogleDriveConnectionInfo"

components:
  schemas:
    GoogleDriveStatus:
      type: object
      required: [connected, folderConfigured, enabled]
      properties:
        connected:
          type: boolean
          description: A refresh token is stored.
        folderConfigured:
          type: boolean
          description: An upload target folder is configured.
        enabled:
          type: boolean
          description: The Google Drive module is toggled on in the modules registry.

    GoogleDriveConnectionInfo:
      type: object
      required: [keyMode, connected, folderConfigured, builtinAvailable, hasOwnCreds, redirectUri]
      properties:
        keyMode:
          type: string
          enum: [builtin, own]
        connected:
          type: boolean
        folderConfigured:
          type: boolean
        builtinAvailable:
          type: boolean
          description: Whether the platform ships built-in OAuth client credentials.
        hasOwnCreds:
          type: boolean
          description: Whether own-mode client secret is stored.
        ownClientId:
          type: string
          description: The stored own-mode OAuth client ID (not secret).
        redirectUri:
          type: string
          description: The OAuth redirect URI to register in the Google client.
        accountEmail:
          type: string
        folderId:
          type: string
        folderName:
          type: string

    GoogleDriveConnectionUpdate:
      type: object
      required: [keyMode]
      properties:
        keyMode:
          type: string
          enum: [builtin, own]
        ownClientId:
          type: string
        ownClientSecret:
          type: string
          description: Plaintext client secret; stored encrypted. Omit to keep existing.

    GoogleDriveAuthUrl:
      type: object
      required: [authUrl]
      properties:
        authUrl:
          type: string

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`).
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    # Multilingual label stored as JSONB {ru: ..., en: ..., he: ...}
    MultilingualText:
      type: object
      properties:
        ru:
          type: string
        en:
          type: string
        he:
          type: string

    # AUTH
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"

    UserOption:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string

    UserProfile:
      type: object
      required: [id, email, firstName, lastName, roleId, language, direction, isActive]
      properties:
        id:
          type: integer
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
        roleName:
          $ref: "#/components/schemas/MultilingualText"
        language:
          type: string
          enum: [ru, en, he]
        direction:
          type: string
          enum: [ltr, rtl]
        startPageId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        permissions:
          $ref: "#/components/schemas/RolePermissions"
        isGuest:
          type: boolean
        impersonator:
          type: ["object", "null"]
          properties:
            id:
              type: integer
            name:
              type: string

    ImpersonateInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 6

    UpdateMeInput:
      type: object
      properties:
        language:
          type: string
          enum: [ru, en, he]
        direction:
          type: string
          enum: [ltr, rtl]
        startPageId:
          type: ["integer", "null"]

    ResetPasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 6

    GuestRedeemInput:
      type: object
      required: [token]
      properties:
        token:
          type: string

    GuestLink:
      type: object
      required: [id, userId, createdAt, isActive]
      properties:
        id:
          type: integer
        userId:
          type: integer
        label:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
        revokedAt:
          type: ["string", "null"]
          format: date-time
        lastUsedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        isActive:
          type: boolean
          description: True when the link is neither revoked nor expired.

    GuestLinkInput:
      type: object
      properties:
        label:
          type: ["string", "null"]
        expiresAt:
          type: ["string", "null"]
          format: date-time
          description: Optional expiry. Null or omitted means the link never expires.

    GuestLinkCreated:
      type: object
      required: [link, url, token]
      properties:
        link:
          $ref: "#/components/schemas/GuestLink"
        token:
          type: string
          description: The one-time plaintext token. Shown only at creation; not retrievable later.
        url:
          type: string
          description: Ready-to-share guest URL containing the token.

    # USERS

        formulaConfigJson:
          $ref: "#/components/schemas/FormulaFieldConfig"
        dependencyConfigJson:
          $ref: "#/components/schemas/DependencyFieldConfig"
        relationConfigJson:
          $ref: "#/components/schemas/RelationFieldConfig"
        isKey:
          type: boolean
          default: false
        lockAfterCreate:
          type: boolean
          default: false
        isFilterable:
          type: boolean
          default: false
        showInTable:
          type: boolean
          default: true
        isPinned:
          type: boolean
          default: false
        showColumnTotal:
          type: boolean
          default: false
        totalFillColor:
          type: ["string", "null"]
        totalTextColor:
          type: ["string", "null"]
        sortOrder:
          type: integer
        isActive:
          type: boolean
          default: true

    FieldsReorderInput:
      type: object
      required: [entityId, items]
      properties:
        entityId:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [id, sortOrder]
            properties:
              id:
                type: integer
              sortOrder:
                type: integer

    FieldUpdate:
      type: object
      properties:
        fieldKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"

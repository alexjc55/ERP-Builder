        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
        roleName:
          $ref: "#/components/schemas/MultilingualText"
        language:
          type: string
          enum: [ru, en, he]
        direction:
          type: string
          enum: [ltr, rtl]
        startPageId:
          type: ["integer", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    UserListResult:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer

    UserInput:
      type: object
      required: [email, firstName, lastName, roleId]
      properties:
        email:
          type: string
          format: email
        password:
          type: ["string", "null"]
          minLength: 6
          description: Omit or null to create a passwordless guest user (cannot log in with a password; access only via a guest link).
        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
        language:
          type: string
          enum: [ru, en, he]
          default: ru
        direction:
          type: string
          enum: [ltr, rtl]
          default: ltr
        startPageId:
          type: ["integer", "null"]

    UserUpdate:
      type: object
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        roleId:
          type: integer
        language:
          type: string
          enum: [ru, en, he]
        direction:
          type: string
          enum: [ltr, rtl]
        startPageId:
          type: ["integer", "null"]

    LoginHistoryEntry:
      type: object
      required: [id, userId, ipAddress, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        ipAddress:
          type: string
        userAgent:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    AuditLogEntry:
      type: object
      required: [id, fieldKey, oldValue, newValue, userId, userName, createdAt]
      properties:

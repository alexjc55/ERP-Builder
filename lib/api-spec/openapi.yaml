          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:
          type: string
        path:
          type: ["string", "null"]
        parentPageId:
          type: ["integer", "null"]
        sortOrder:
          type: integer
        isActive:
          type: boolean
        children:
          type: array
          items:
            $ref: "#/components/schemas/Page"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    PageInput:
      type: object
      required: [nameJson, icon]
      properties:
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        descriptionJson:
          $ref: "#/components/schemas/MultilingualText"
        icon:

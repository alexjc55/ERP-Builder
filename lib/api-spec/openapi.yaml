          type: integer
        entityId:
          type: ["integer", "null"]
        recordId:
          type: ["integer", "null"]
        fieldKey:
          type: ["string", "null"]
        oldValue:
          type: ["string", "null"]
        newValue:
          type: ["string", "null"]
        userId:
          type: ["integer", "null"]
        userName:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    # EVENTS
    SystemEvent:

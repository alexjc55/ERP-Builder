    # PAGE-LOCAL FIELDS (mirror pages)
    PageRelatedValuesInput:
      type: object
      required: [recordIds]
      properties:
        recordIds:
          type: array
          items:
            type: integer
        pageId:
          type: integer
          description: Optional mirror-page context for the entity-keyed endpoint. When the records are viewed through a mirror page, pass its id so the view gate and own-scope honor the page's per-mirror permission override. Ignored by the page-keyed endpoint (which takes pageId from the path).

    PageRelatedColumn:
      type: object
      required: [fieldKey, relatedFieldKey, editableColumn]
      properties:
        fieldKey:
          type: string
          description: The relation page-field's own key (column identity).
        relatedFieldKey:
          type: string
        relatedFieldType:
          type: ["string", "null"]
          description: Field type of the related entity field (drives rendering/editing).
        optionsJson:
          type: array
          items:
            type: string
          description: Select options of the related field (for inline editing).
        editableColumn:
          type: boolean
          description: Whether the viewer's role may edit the related field at all (before per-row scope).
        relatedEntityId:
          type: integer
          description: The id of the related entity this column projects from (set by the entity-keyed endpoint; used to open the linked record's editor for write-through lookups).
        writeThrough:
          type: boolean
          description: True for a write-through lookup column whose cells open the linked record's full editor in the related entity.

    PageRelatedValue:
      type: object
      required: [recordId, fieldKey, editable]
      properties:
        recordId:
          type: integer
        fieldKey:
          type: string
        value:
          description: The related field's value (null if hidden for the viewer or no linked record).
        linkedRecordId:
          type: ["integer", "null"]
        editable:
          type: boolean

    PageRelatedValues:
      type: object
      required: [columns, values]
      properties:
        columns:
          type: array
          items:
            $ref: "#/components/schemas/PageRelatedColumn"
        values:
          type: array
          items:
            $ref: "#/components/schemas/PageRelatedValue"

    PageRelatedCandidatesInput:
      type: object
      required: [fieldKey]
      properties:
        fieldKey:
          type: string
          description: The relation page-field's own key (identifies which relation to list candidates for).
        q:
          type: string
          description: Optional case-insensitive search over the candidate label (related field value).
        parentValue:
          type: string
          nullable: true
          description: >-
            For a dependent (cascading) relation field, the current row's
            parent-field value used to narrow candidates: a scalar value, or a
            linked record id (as a string) when the parent is itself a relation
            field. Empty/omitted yields no candidates when the field is
            dependent.

    PageRelatedCandidate:
      type: object
      required: [id, label]
      properties:
        id:
          type: integer
          description: The related entity record id (to link to).
        label:
          type: string
          description: Display label (the related field value as text).

    PageRelatedCandidates:
      type: object
      required: [candidates]
      properties:
        candidates:
          type: array
          items:
            $ref: "#/components/schemas/PageRelatedCandidate"
        relatedEntityId:
          type: integer
          description: >-
            The id of the related entity these candidates belong to. Returned by
            the entity-keyed endpoint so the client can quick-create a new record
            in that entity and link it. Omitted by the page-keyed endpoint.
        relatedFieldKey:
          type: string
          description: >-
            The related entity field key used to build a candidate's display
            label. Returned by the entity-keyed endpoint so the client can derive
            the label of a freshly quick-created record (which is not yet in the
            candidate list). Omitted by the page-keyed endpoint.
        canCreate:
          type: boolean
          description: >-
            True when the viewer may create a record in the related entity (drives
            the in-place "add record" affordance in the picker).

    PageRelatedLinkInput:
      type: object
      required: [fieldKey, recordId]
      properties:
        fieldKey:
          type: string
          description: The relation page-field's own key.
        recordId:
          type: integer
          description: The base (page) record whose link is being set.
        linkedRecordId:
          type: ["integer", "null"]
          description: The related record to link to, or null to clear the existing link.

    PageRelatedLinkResult:
      type: object
      required: [linkedRecordId]
      properties:
        linkedRecordId:
          type: ["integer", "null"]
          description: The linked record id after the change (null if cleared).
        value:
          description: The related field value after the change (null if cleared or hidden).

    PageRelationOptionField:
      type: object
      required: [key, label, fieldType]
      properties:
        key:
          type: string
        label:
          $ref: "#/components/schemas/MultilingualText"
        fieldType:
          type: string

    PageRelationOptionPage:
      type: object
      description: >-
        A page (bound or mirror) of the related entity whose page-local fields a
        lookup field may project instead of the linked record's own fields.
      required: [pageId, pageLabel, fields]
      properties:
        pageId:
          type: integer
        pageLabel:
          $ref: "#/components/schemas/MultilingualText"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/PageRelationOptionField"

    PageRelationOption:
      type: object
      required: [relationId, label, direction, relatedEntityId, relatedEntityLabel, fields, pages]
      properties:
        relationId:
          type: integer
        label:
          $ref: "#/components/schemas/MultilingualText"
        direction:
          type: string
          enum: [source, target]
          description: >-
            Which side of the relation `entityId` sits on. "source" = this entity
            is the relation's source linking to one target (1:1 / N:1); "target" =
            the inverse single-link side (1:1 / 1:N). Entity `relation` fields are
            eligible only for "source" options.
        relatedEntityId:
          type: integer
        relatedEntityLabel:
          $ref: "#/components/schemas/MultilingualText"
        fields:
          type: array
          items:
            $ref: "#/components/schemas/PageRelationOptionField"
        pages:
          type: array
          description: >-
            Pages (bound + mirror) of the related entity whose page-local
            value-backed fields a relation/lookup field can project (via relatedPageId).
          items:
            $ref: "#/components/schemas/PageRelationOptionPage"

    PageRelationOptions:
      type: object
      required: [options]
      properties:
        options:
          type: array
          items:
            $ref: "#/components/schemas/PageRelationOption"

    RelationFieldConfig:
      type: object
      description: Config for a relation-type page field (surfaces one field of a linked related record).
      properties:
        relationId:
          type: ["integer", "null"]
        relatedFieldKey:
          type: ["string", "null"]
        relatedPageId:
          type: ["integer", "null"]
          description: >-
            Supported for both relation and lookup fields. When set, the
            projected `relatedFieldKey` is read from this PAGE's page-local
            values (page_record_values keyed by the linked record) instead of the
            linked entity record's own fields. The page's effective entity must
            equal the relation's related entity, and `relatedFieldKey` must be a
            value-backed page field of that page. The projected value is always
            read-only (no write-through); a relation field's link itself stays
            assignable.
        writeThrough:
          type: boolean
          description: >-
            Lookup-only. When true, a lookup field becomes an editable gateway:
            clicking the cell opens the LINKED record's full editor in the
            related entity (subject to that entity's own permissions). The
            projected value itself stays read-only; ignored for relation fields
            and for page-source lookups (when relatedPageId is set).

    PageField:
      type: object
      required: [id, pageId, fieldKey, nameJson, fieldType, isRequired, optionsJson, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer

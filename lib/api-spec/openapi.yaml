            $ref: "#/components/schemas/FilterCondition"
        filterConjunction:
          type: string
          enum: [and, or]
          default: and
        sorts:
          type: array
          items:
            $ref: "#/components/schemas/SortSpec"
        search:
          type: string
        visibleFields:
          type: array
          items:
            type: string

    View:
      type: object
      required: [id, entityId, viewKey, nameJson, configJson, isDefault, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        entityId:
          type: integer
        viewKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        configJson:
          $ref: "#/components/schemas/ViewConfig"
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ViewInput:
      type: object
      required: [viewKey, nameJson]
      properties:
        viewKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        configJson:
          $ref: "#/components/schemas/ViewConfig"
        isDefault:
          type: boolean
          default: false
        sortOrder:
          type: integer
        isActive:
          type: boolean
          default: true

    ViewUpdate:
      type: object
      properties:
        viewKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        configJson:
          $ref: "#/components/schemas/ViewConfig"
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        isActive:
          type: boolean

    ViewsReorderInput:
      type: object
      required: [entityId, items]
      properties:
        entityId:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [id, sortOrder]
            properties:
              id:
                type: integer
              sortOrder:
                type: integer

    RecordQuery:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: "#/components/schemas/FilterCondition"
        filterConjunction:
          type: string
          enum: [and, or]
          default: and
        statusIds:
          type: array
          items:
            type: integer
        sorts:
          type: array
          items:
            $ref: "#/components/schemas/SortSpec"
        search:
          type: string
        archived:
          $ref: "#/components/schemas/ArchiveFilter"
        page:
          type: integer
          minimum: 1
          default: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 200
          default: 50

    RecordQueryResult:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EntityRecord"
        total:
          type: integer

    FilterValuesQuery:
      type: object
      required: [field]
      properties:
        field:
          type: string
        filters:
          type: array
          items:
            $ref: "#/components/schemas/FilterCondition"
        filterConjunction:
          type: string
          enum: [and, or]
          default: and
        statusIds:
          type: array
          items:
            type: integer
        search:
          type: string
        archived:
          $ref: "#/components/schemas/ArchiveFilter"

    FilterValuesResult:
      type: object
      required: [values]
      properties:
        values:
          type: array
          items:
            type: string

    # RELATIONS
    RelationType:
      type: string
      enum: [one_to_one, one_to_many, many_to_one, many_to_many]

    Relation:
      type: object
      required: [id, sourceEntityId, targetEntityId, relationKey, relationType, nameJson, inverseNameJson, settingsJson, createdAt, updatedAt]
      properties:
        id:
          type: integer
        sourceEntityId:
          type: integer
        targetEntityId:
          type: integer
        relationKey:
          type: string
        relationType:
          $ref: "#/components/schemas/RelationType"
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        inverseNameJson:
          $ref: "#/components/schemas/MultilingualText"
        settingsJson:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RelationInput:
      type: object
      required: [targetEntityId, relationKey, relationType, nameJson]
      properties:
        targetEntityId:
          type: integer
        relationKey:
          type: string
        relationType:
          $ref: "#/components/schemas/RelationType"
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        inverseNameJson:
          $ref: "#/components/schemas/MultilingualText"
        settingsJson:
          type: object
          additionalProperties: true

    RelationUpdate:
      type: object
      properties:
        relationKey:
          type: string
        relationType:
          $ref: "#/components/schemas/RelationType"
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        inverseNameJson:
          $ref: "#/components/schemas/MultilingualText"
        settingsJson:
          type: object
          additionalProperties: true

    RecordLink:
      type: object
      required: [id, relationId, sourceRecordId, targetRecordId, createdAt]
      properties:
        id:
          type: integer
        relationId:
          type: integer
        sourceRecordId:
          type: integer
        targetRecordId:
          type: integer
        createdAt:
          type: string
          format: date-time

    LinkedRecord:
      type: object
      required: [linkId, relationId, record]
      properties:
        linkId:
          type: integer
        relationId:
          type: integer
        record:
          $ref: "#/components/schemas/EntityRecord"

    LinkInput:
      type: object
      required: [relationId, targetRecordId]
      properties:
        relationId:
          type: integer
        targetRecordId:
          type: integer

    # TRANSLATIONS
    Translation:
      type: object
      required: [id, translationKey, translationsJson, createdAt, updatedAt]
      properties:
        id:
          type: integer
        translationKey:
          type: string
        translationsJson:
          $ref: "#/components/schemas/MultilingualText"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TranslationInput:
      type: object
      required: [translationKey, translationsJson]
      properties:
        translationKey:
          type: string
        translationsJson:
          $ref: "#/components/schemas/MultilingualText"

    TranslationUpdate:
      type: object
      required: [translationsJson]
      properties:
        translationsJson:
          $ref: "#/components/schemas/MultilingualText"

    # DASHBOARD
    DashboardStats:
      type: object
      required: [totalUsers, activeUsers, totalRoles, totalPages]
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        blockedUsers:
          type: integer
        totalRoles:
          type: integer
        totalPages:
          type: integer
        recentLogins:
          type: integer

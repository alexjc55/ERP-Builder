          type: array
          items:
            $ref: "#/components/schemas/TransitionAction"
          default: []
        sortOrder:
          type: integer

    TransitionUpdate:
      type: object
      properties:
        fromStatusId:
          type: ["integer", "null"]
        toStatusId:
          type: integer
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        allowedRoleIds:
          type: array
          items:
            type: integer
        requiredFieldKeys:
          type: array
          items:
            type: string
        actionsJson:
          type: array
          items:
            $ref: "#/components/schemas/TransitionAction"
        sortOrder:
          type: integer

    # RECORDS
    EntityRecord:
      type: object
      required: [id, entityId, valuesJson, statusId, archivedAt, statusChangedAt, createdAt, updatedAt]
      properties:
        id:
          type: integer
        entityId:
          type: integer
        valuesJson:
          type: object
          additionalProperties: true
        statusId:
          type: ["integer", "null"]
        archivedAt:
          type: ["string", "null"]
          format: date-time
        statusChangedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ArchiveFilter:
      type: string
      enum: [active, archived, all]
      default: active

    RecordInput:
      type: object
      required: [valuesJson]
      properties:
        valuesJson:
          type: object
          additionalProperties: true
        statusId:
          type: ["integer", "null"]
        pageId:
          type: integer
          description: >-
            Optional mirror-page context. When this create is performed through a
            mirror page, send its page id so the server applies that page's
            record-rights override (if configured for the role) instead of the
            source entity's rights.

    RecordDelete:
      type: object
      properties:
        pageId:
          type: integer
          description: >-
            Optional mirror-page context (see RecordInput.pageId): applies the
            mirror page's delete-rights override when deleting through it.

    RecordUpdate:
      type: object
      properties:
        valuesJson:
          type: object
          additionalProperties: true
        statusId:
          type: ["integer", "null"]
        pageId:
          type: integer
          description: >-
            Optional mirror-page context (see RecordInput.pageId): applies the
            mirror page's update-rights override when editing through it.

    # VIEWS
    FilterOperator:
      type: string
      enum:
        - eq
        - neq
        - contains
        - not_contains
        - starts_with
        - ends_with
        - gt
        - gte
        - lt
        - lte
        - is_empty
        - is_not_empty
        - in
        - between

    FilterCondition:
      type: object
      required: [field, operator]
      properties:
        field:
          type: string
        operator:
          $ref: "#/components/schemas/FilterOperator"
        value: {}

    SortSpec:
      type: object
      required: [field]
      properties:
        field:
          type: string
        direction:
          type: string
          enum: [asc, desc]
          default: asc

    ViewConfig:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: "#/components/schemas/FilterCondition"
        filterConjunction:
          type: string
          enum: [and, or]
          default: and
        sorts:
          type: array
          items:
            $ref: "#/components/schemas/SortSpec"
        search:
          type: string
        visibleFields:
          type: array
          items:
            type: string

    View:
      type: object
      required: [id, entityId, viewKey, nameJson, configJson, isDefault, sortOrder, isActive, createdAt, updatedAt]
      properties:
        id:
          type: integer
        entityId:
          type: integer
        viewKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        configJson:
          $ref: "#/components/schemas/ViewConfig"
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ViewInput:
      type: object
      required: [viewKey, nameJson]
      properties:
        viewKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        configJson:
          $ref: "#/components/schemas/ViewConfig"
        isDefault:
          type: boolean
          default: false
        sortOrder:
          type: integer
        isActive:
          type: boolean
          default: true

    ViewUpdate:
      type: object
      properties:
        viewKey:
          type: string
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        configJson:
          $ref: "#/components/schemas/ViewConfig"
        isDefault:
          type: boolean
        sortOrder:
          type: integer
        isActive:
          type: boolean

    ViewsReorderInput:
      type: object
      required: [entityId, items]
      properties:
        entityId:
          type: integer
        items:
          type: array
          items:
            type: object
            required: [id, sortOrder]
            properties:
              id:
                type: integer
              sortOrder:
                type: integer

    RecordQuery:
      type: object
      properties:
        filters:
          type: array
          items:
            $ref: "#/components/schemas/FilterCondition"
        pageLocalFilters:
          type: array
          description: >-
            Filter conditions on PAGE-LOCAL fields (values stored in
            page_record_values), keyed by page-field fieldKey. Requires pageId.
            Each condition is AND-combined with the rest of the query. Only
            visible (per-role) filterable page-local fields are accepted.
          items:
            $ref: "#/components/schemas/FilterCondition"
        filterConjunction:
          type: string
          enum: [and, or]
          default: and
        statusIds:
          type: array
          items:
            type: integer
        sorts:
          type: array
          items:
            $ref: "#/components/schemas/SortSpec"
        search:
          type: string
        archived:
          $ref: "#/components/schemas/ArchiveFilter"
        page:
          type: integer
          minimum: 1
          default: 1
        pageSize:
          type: integer
          minimum: 1
          maximum: 200
          default: 50
        pageId:
          type: integer
          description: >-
            Optional mirror-page context (see RecordInput.pageId): applies the
            mirror page's view-rights override and field-access when querying
            records through it.

    RecordQueryResult:
      type: object
      required: [data, total]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/EntityRecord"
        total:
          type: integer
        numericTotals:
          type: object
          additionalProperties:
            type: number
          description: Sum per numeric field flagged showColumnTotal, over the full filtered set (all pages).

    FilterValuesQuery:
      type: object
      required: [field]
      properties:
        pageId:
          type: integer
          description: >-
            Optional mirror-page context. When the request is made through a
            mirror page, this lets the server honor a per-mirror-page record
            permission override for the view check.
        field:
          type: string
        filters:
          type: array
          items:
            $ref: "#/components/schemas/FilterCondition"
        filterConjunction:
          type: string
          enum: [and, or]
          default: and
        statusIds:
          type: array
          items:
            type: integer
        search:
          type: string
        archived:
          $ref: "#/components/schemas/ArchiveFilter"

    FilterValuesResult:
      type: object
      required: [values]
      properties:
        values:
          type: array
          items:
            type: string

    DependentParentValue:
      type: object
      required: [field, value]
      properties:
        field:
          type: string
        value:
          type: string

    DependentValuesQuery:
      type: object
      properties:
        pageId:
          type: integer
          description: Optional mirror-page context for the view permission check.
        parentValues:
          type: array
          description: >-
            The current values of this field's parent-chain (closest parent and
            its ancestors). Each narrows the option list.
          items:
            $ref: "#/components/schemas/DependentParentValue"

    RenameFieldValueInput:
      type: object
      required: [oldValue, newValue]
      properties:
        pageId:
          type: integer
          description: Optional mirror-page context for the update permission check.
        parentValues:
          type: array
          description: Parent-chain values that scope which records are renamed.
          items:
            $ref: "#/components/schemas/DependentParentValue"
        oldValue:
          type: string
        newValue:
          type: string

    RenameFieldValueResult:
      type: object
      required: [updated]
      properties:
        updated:
          type: integer

    # RELATIONS
    RelationType:
      type: string
      enum: [one_to_one, one_to_many, many_to_one, many_to_many]

    Relation:
      type: object
      required: [id, sourceEntityId, targetEntityId, relationKey, relationType, nameJson, inverseNameJson, settingsJson, createdAt, updatedAt]
      properties:
        id:
          type: integer
        sourceEntityId:
          type: integer
        targetEntityId:
          type: integer
        relationKey:
          type: string
        relationType:
          $ref: "#/components/schemas/RelationType"
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        inverseNameJson:
          $ref: "#/components/schemas/MultilingualText"
        settingsJson:
          type: object
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RelationInput:
      type: object
      required: [targetEntityId, relationKey, relationType, nameJson]
      properties:
        targetEntityId:
          type: integer
        relationKey:
          type: string
        relationType:
          $ref: "#/components/schemas/RelationType"
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        inverseNameJson:
          $ref: "#/components/schemas/MultilingualText"
        settingsJson:
          type: object
          additionalProperties: true

    RelationUpdate:
      type: object
      properties:
        relationKey:
          type: string
        relationType:
          $ref: "#/components/schemas/RelationType"
        nameJson:
          $ref: "#/components/schemas/MultilingualText"
        inverseNameJson:
          $ref: "#/components/schemas/MultilingualText"
        settingsJson:
          type: object
          additionalProperties: true

    RecordLink:
      type: object
      required: [id, relationId, sourceRecordId, targetRecordId, createdAt]
      properties:
        id:
          type: integer
        relationId:
          type: integer
        sourceRecordId:
          type: integer
        targetRecordId:
          type: integer
        createdAt:
          type: string
          format: date-time

    LinkedRecord:
      type: object
      required: [linkId, relationId, record]
      properties:
        linkId:
          type: integer
        relationId:
          type: integer
        record:
          $ref: "#/components/schemas/EntityRecord"

    LinkInput:
      type: object
      required: [relationId, targetRecordId]
      properties:
        relationId:
          type: integer
        targetRecordId:
          type: integer

    # TRANSLATIONS
    Translation:
      type: object
      required: [id, translationKey, translationsJson, createdAt, updatedAt]
      properties:
        id:
          type: integer
        translationKey:
          type: string
        translationsJson:
          $ref: "#/components/schemas/MultilingualText"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TranslationInput:
      type: object
      required: [translationKey, translationsJson]
      properties:
        translationKey:
          type: string
        translationsJson:
          $ref: "#/components/schemas/MultilingualText"

    TranslationUpdate:
      type: object
      required: [translationsJson]
      properties:
        translationsJson:
          $ref: "#/components/schemas/MultilingualText"

    # DASHBOARD
    DashboardStats:
      type: object
      required: [totalUsers, activeUsers, totalRoles, totalPages]
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        blockedUsers:
          type: integer
        totalRoles:
          type: integer
        totalPages:
          type: integer
        recentLogins:
          type: integer
